    <header>
        <img src="logo.png" alt="Evergreen Assessments Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <main>
        <h1>Contact Me</h1>
        <p>If you have any questions or would like to request a quote for services, please fill out the form below. I’ll get back to you as soon as possible.</p>
        <form action="https://formsubmit.co/Matthew.d.hanson@outlook.com" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">Send</button>
        </form>
    </main>
